version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: certificados_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/certificados_db
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data: