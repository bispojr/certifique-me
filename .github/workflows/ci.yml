name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: senha_segura
          POSTGRES_DB: certificados_db_test
        ports:
          - 5432:5432
        options: >
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DB_USER: postgres
      DB_PASSWORD: senha_segura
      DB_NAME: certificados_db_test
      DB_NAME_TEST: certificados_db_test
      DB_HOST: localhost
      DB_PORT_TEST: 5432
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run migrations
        run: npx sequelize-cli db:migrate --env test
      - name: Run tests
        run: npm test
