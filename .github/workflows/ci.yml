name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres_test:
        image: postgres:15
        env:
          POSTGRES_DB: certificados_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5433:5432
        options: >
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Install docker-compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose
      - name: Clean up Docker containers (before)
        run: docker-compose -f docker-compose.test.yml down --remove-orphans || true
      - name: Clean up Docker containers
        run: docker ps -aq | xargs -r docker rm -f
      - name: Start test containers
        run: docker-compose -f docker-compose.test.yml up -d
      - name: Wait for DB
        run: sleep 10
      - name: Run tests
        run: npm run test:docker -- --detectOpenHandles
      - name: Clean up Docker containers (after)
        run: docker-compose -f docker-compose.test.yml down --remove-orphans || true
