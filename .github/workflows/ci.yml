name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Install docker-compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose
      - name: Clean up Docker containers (before)
        run: docker-compose -f docker-compose.test.yml down --remove-orphans || true
      - name: Clean up all containers
        run: docker ps -aq | xargs -r docker rm -f || true
      - name: Start test containers
        run: docker-compose -f docker-compose.test.yml up -d
      - name: Wait for DB
        run: sleep 10
      - name: Run lint and tests (check)
        env:
          DB_USER: postgres
          DB_PASSWORD: password
          DB_HOST: localhost
          DB_NAME: certificados_test
          DB_PORT: 5432
          DB_NAME_TEST: certificados_test
          DB_PORT_TEST: 5433
          JWT_SECRET: jwt_secret_teste
        run: npm run check:docker
      - name: Run tests with coverage (docker)
        run: docker-compose -f docker-compose.test.yml exec -T app_test sh -c 'npm run test:coverage'
      - name: Remove coverage do host se existir
        run: sudo rm -rf ./coverage
      - name: Copy coverage from container
        run: docker cp $(docker-compose -f docker-compose.test.yml ps -q app_test):/app/coverage ./coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Clean up Docker containers (after)
        run: docker-compose -f docker-compose.test.yml down --remove-orphans || true
