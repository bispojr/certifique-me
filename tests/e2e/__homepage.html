<html lang='pt-BR'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title> | Certifique-me</title>
    <link
      rel='stylesheet'
      href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css'
    />
  </head>
  <body>
    <nav class='navbar navbar-expand-lg navbar-dark bg-primary'>
      <div class='container'>
        <a class='navbar-brand' href='/'>Certifique-me</a>
        <div class='navbar-nav ms-auto'>
          <a class='nav-link text-white' href='/certificados'>Meus Certificados</a>
          <a
            class='nav-link text-white'
            href='/certificados/validar'
          >Validar</a>
          <a class='nav-link text-white' href='/auth/login'>Entrar</a>
        </div>
      </div>
    </nav>
    <div class='container mt-4'>
      <div class='row justify-content-center mt-5'>
  <div class='col-md-6'>
    <h2>Obter meus certificados</h2>
    <form method='POST' action='/public/pagina/buscar' id='form-obter'>
      <div class='mb-3'>
        <label for='email' class='form-label'>E-mail</label>
        <input
          type='email'
          class='form-control'
          id='email'
          name='email'
          required
          placeholder='Digite seu e-mail cadastrado'
        />
      </div>
      <button type='submit' class='btn btn-primary'>Buscar certificados</button>
    </form>
    <a href='/public/pagina/opcoes' class='btn btn-link mt-3'>← Voltar</a>
  </div>
</div>
    </div>
    <script
      src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'
    ></script>
  </body>
</html>
